<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Alphabet Match</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔤</text></svg>">
</head>
<body>
<style>
  :root{
    --sky-top:#c9ecff;
    --sky-bottom:#e9fbf0;
    --card:#ffffff;
    --card-edge:#2e2d55;
    --sunshine:#ffd23f;
    --sunshine-edge:#e8a800;
    --coral:#ff6b6b;
    --grape:#6c4fd8;
    --leaf:#26b789;
    --ink:#2e2d55;
    --ink-soft:#6a6899;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    margin:0;
    font-family:ui-rounded,"SF Pro Rounded","Arial Rounded MT Bold","Hiragino Maru Gothic ProN","Comic Sans MS",system-ui,sans-serif;
    background:linear-gradient(180deg,var(--sky-top) 0%,var(--sky-bottom) 100%);
    color:var(--ink);
    touch-action:manipulation;
    user-select:none;
    -webkit-user-select:none;
    overflow:hidden;
  }
  button{
    font-family:inherit;
    color:inherit;
    cursor:pointer;
    border:none;
    background:none;
    touch-action:manipulation;
  }
  button:focus-visible{outline:4px solid var(--grape);outline-offset:3px}

  /* ---------- stage ---------- */
  .stage{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:clamp(12px,2.5vh,28px);
    padding:clamp(12px,3vw,32px);
    text-align:center;
  }
  .hidden{display:none !important}

  /* ---------- painted sky ---------- */
  #sky{position:fixed;inset:0;pointer-events:none;z-index:0}

  /* ---------- top bar ---------- */
  .topbar{
    position:fixed;
    top:0;left:0;right:0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:clamp(10px,2vw,18px) clamp(14px,3vw,24px);
    z-index:5;
    pointer-events:none;
  }
  .topbar>*{pointer-events:auto}
  .stars{
    display:flex;
    align-items:center;
    gap:8px;
    background:rgba(255,255,255,.85);
    border:3px solid var(--card-edge);
    border-radius:999px;
    padding:6px 16px;
    font-size:clamp(18px,3vw,24px);
    font-weight:800;
    box-shadow:0 4px 0 rgba(46,45,85,.18);
  }
  .round-btn{
    width:clamp(48px,7vw,58px);
    height:clamp(48px,7vw,58px);
    border-radius:50%;
    background:rgba(255,255,255,.85);
    border:3px solid var(--card-edge);
    font-size:clamp(20px,3vw,26px);
    box-shadow:0 4px 0 rgba(46,45,85,.18);
    display:flex;align-items:center;justify-content:center;
    transition:transform .1s;
  }
  .round-btn:active{transform:scale(.9)}

  /* ---------- start screen ---------- */
  .start-title{
    font-size:clamp(34px,7vw,60px);
    font-weight:900;
    margin:0;
    letter-spacing:.02em;
    text-wrap:balance;
  }
  .start-blocks{
    display:flex;
    align-items:center;
    gap:clamp(8px,2vw,16px);
  }
  .start-blocks span{
    display:flex;
    align-items:center;
    justify-content:center;
    width:clamp(56px,11vw,92px);
    height:clamp(56px,11vw,92px);
    animation:bob 2.2s ease-in-out infinite;
  }
  .start-blocks svg{width:100%;height:100%}
  .mini-letter{
    font-size:clamp(30px,6vw,52px);
    font-weight:900;
    background:linear-gradient(180deg,#ffe07a 0%,var(--sunshine) 100%);
    border:4px solid var(--sunshine-edge);
    border-radius:clamp(12px,2vw,18px);
    box-shadow:0 5px 0 var(--sunshine-edge);
    color:var(--ink);
  }
  .mini-letter.alt{
    background:linear-gradient(180deg,#ffb3c8 0%,#ff9ecd 100%);
    border-color:#e0679f;
    box-shadow:0 5px 0 #e0679f;
  }
  .start-blocks span:nth-child(2){animation-delay:.25s}
  .start-blocks span:nth-child(3){animation-delay:.5s}
  .start-blocks span:nth-child(4){animation-delay:.75s}
  @keyframes bob{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-14px)}
  }
  .big-btn{
    font-size:clamp(24px,5vw,34px);
    font-weight:900;
    letter-spacing:.03em;
    background:var(--leaf);
    color:#fff;
    border:4px solid var(--card-edge);
    border-radius:999px;
    padding:clamp(16px,3vh,22px) clamp(40px,8vw,64px);
    box-shadow:0 7px 0 rgba(46,45,85,.35);
    transition:transform .1s, box-shadow .1s;
  }
  .big-btn:active{transform:translateY(5px);box-shadow:0 2px 0 rgba(46,45,85,.35)}
  .big-btn.next{background:var(--coral)}

  /* ---------- play screen ---------- */
  .prompt-row{
    display:flex;
    align-items:center;
    gap:clamp(12px,3vw,24px);
  }
  .letter-block{
    font-size:clamp(72px,16vh,150px);
    font-weight:900;
    line-height:1;
    background:linear-gradient(180deg,#ffe07a 0%,var(--sunshine) 100%);
    border:5px solid var(--sunshine-edge);
    border-radius:clamp(18px,3vw,28px);
    padding:clamp(14px,2.5vh,26px) clamp(24px,4.5vh,44px);
    box-shadow:0 8px 0 var(--sunshine-edge), 0 14px 22px rgba(46,45,85,.18);
    color:var(--ink);
    animation:pop-in .45s cubic-bezier(.2,1.6,.4,1) both;
  }
  .letter-block .lower{font-size:.72em;margin-left:.14em}
  .speak-btn{
    width:clamp(58px,9vw,72px);
    height:clamp(58px,9vw,72px);
    border-radius:50%;
    background:var(--grape);
    border:4px solid var(--card-edge);
    font-size:clamp(24px,4vw,32px);
    box-shadow:0 5px 0 rgba(46,45,85,.35);
    display:flex;align-items:center;justify-content:center;
    transition:transform .1s;
  }
  .speak-btn:active{transform:scale(.9)}
  .prompt-text{
    font-size:clamp(18px,3.2vw,26px);
    font-weight:800;
    color:var(--ink-soft);
    margin:0;
  }
  .cards{
    display:flex;
    justify-content:center;
    gap:clamp(10px,2.5vw,28px);
    width:100%;
    max-width:920px;
  }
  .card{
    flex:1 1 0;
    max-width:270px;
    aspect-ratio:1/1.06;
    background:var(--card);
    border:5px solid var(--card-edge);
    border-radius:clamp(20px,3.5vw,32px);
    box-shadow:0 8px 0 rgba(46,45,85,.22);
    padding:clamp(10px,2vw,20px);
    display:flex;
    align-items:center;
    justify-content:center;
    transition:transform .12s, box-shadow .12s, opacity .3s;
    animation:pop-in .45s cubic-bezier(.2,1.6,.4,1) both;
  }
  .card:nth-child(2){animation-delay:.08s}
  .card:nth-child(3){animation-delay:.16s}
  .card:active{transform:scale(.94) translateY(4px);box-shadow:0 3px 0 rgba(46,45,85,.22)}
  .card svg{width:100%;height:100%}
  .card.wrong{
    animation:wiggle .5s ease;
    opacity:.35;
    pointer-events:none;
  }
  .card.right{
    animation:cheer .6s cubic-bezier(.2,1.6,.4,1);
    background:#eafff4;
    border-color:var(--leaf);
    box-shadow:0 8px 0 rgba(38,183,137,.5);
  }
  @keyframes pop-in{
    from{transform:scale(.3);opacity:0}
    to{transform:scale(1);opacity:1}
  }
  @keyframes wiggle{
    0%,100%{transform:translateX(0) rotate(0)}
    20%{transform:translateX(-12px) rotate(-4deg)}
    40%{transform:translateX(12px) rotate(4deg)}
    60%{transform:translateX(-9px) rotate(-3deg)}
    80%{transform:translateX(9px) rotate(3deg)}
  }
  @keyframes cheer{
    0%{transform:scale(1)}
    40%{transform:scale(1.18) rotate(-3deg)}
    70%{transform:scale(1.08) rotate(2deg)}
    100%{transform:scale(1.12)}
  }

  /* ---------- victory screen ---------- */
  .victory-art{
    width:clamp(130px,24vh,210px);
    height:clamp(130px,24vh,210px);
    animation:bounce-big .9s cubic-bezier(.3,1.6,.4,1) both;
  }
  .victory-art svg{width:100%;height:100%;display:block}
  @keyframes bounce-big{
    0%{transform:scale(0) rotate(-15deg)}
    55%{transform:scale(1.2) rotate(6deg)}
    100%{transform:scale(1) rotate(0)}
  }
  .word-tiles{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:clamp(6px,1.5vw,12px);
  }
  .tile{
    font-size:clamp(30px,7vw,60px);
    font-weight:900;
    line-height:1;
    background:var(--card);
    border:4px solid var(--card-edge);
    border-radius:clamp(10px,2vw,16px);
    padding:clamp(10px,2vh,18px) clamp(12px,2.4vh,22px);
    box-shadow:0 5px 0 rgba(46,45,85,.22);
    animation:tile-pop .4s cubic-bezier(.2,1.6,.4,1) both;
  }
  .tile.first{
    background:linear-gradient(180deg,#ffe07a 0%,var(--sunshine) 100%);
    border-color:var(--sunshine-edge);
    box-shadow:0 5px 0 var(--sunshine-edge);
  }
  @keyframes tile-pop{
    from{transform:scale(0) translateY(20px);opacity:0}
    to{transform:scale(1) translateY(0);opacity:1}
  }
  .is-for{
    font-size:clamp(22px,4.5vw,36px);
    font-weight:900;
    margin:0;
    color:var(--grape);
  }
  .victory-stars{
    display:flex;
    justify-content:center;
    gap:clamp(8px,2vw,16px);
    font-size:clamp(32px,6.5vw,52px);
    line-height:1;
    min-height:1.2em;
  }
  .victory-stars .won{
    display:inline-block;
    animation:tile-pop .45s cubic-bezier(.2,1.6,.4,1) both;
  }
  .victory-stars .lost{opacity:.22;filter:grayscale(1)}

  /* confetti canvas */
  #confetti{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:20;
  }

  /* narrow phones: "W w" plus the speak button must still fit across */
  @media (max-width:480px){
    .letter-block{font-size:clamp(56px,12vh,104px);padding:clamp(12px,2vh,20px) clamp(18px,3.5vh,32px)}
  }

  /* short screens (phone landscape): tighten play screen */
  @media (max-height:520px){
    .letter-block{font-size:clamp(56px,18vh,90px);padding:10px 26px}
    .prompt-text{display:none}
    .stage{gap:10px}
    .victory-art{width:clamp(80px,26vh,120px);height:clamp(80px,26vh,120px)}
  }

  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{animation-duration:.01s !important;animation-delay:0s !important;transition-duration:.01s !important}
  }
</style>

<canvas id="sky"></canvas>
<canvas id="confetti"></canvas>

<div class="topbar">
  <div class="stars">⭐ <span id="star-count">0</span></div>
  <button class="round-btn" id="mute-btn" aria-label="Turn sound on or off">🔊</button>
</div>

<!-- START -->
<div class="stage" id="screen-start">
  <div class="start-blocks" aria-hidden="true">
    <span class="mini-letter">A</span><span id="start-art-1"></span><span class="mini-letter alt">B</span><span id="start-art-2"></span>
  </div>
  <h1 class="start-title">Alphabet Match!</h1>
  <button class="big-btn" id="play-btn">▶&nbsp; PLAY</button>
</div>

<!-- PLAY -->
<div class="stage hidden" id="screen-play">
  <div class="prompt-row">
    <div class="letter-block" id="letter-block">B<span class="lower">b</span></div>
    <button class="speak-btn" id="repeat-btn" aria-label="Hear it again">🔊</button>
  </div>
  <p class="prompt-text">Which picture starts with this letter?</p>
  <div class="cards" id="cards"></div>
</div>

<!-- VICTORY -->
<div class="stage hidden" id="screen-victory">
  <div class="victory-art" id="victory-art"></div>
  <p class="is-for" id="is-for">B is for…</p>
  <div class="word-tiles" id="word-tiles"></div>
  <div class="victory-stars" id="victory-stars"></div>
  <button class="big-btn next" id="next-btn">NEXT &nbsp;▶</button>
</div>

<script>
(function(){
  "use strict";

  /* ---------------- word bank ---------------- */
  // Words chosen for 3-5 year olds: concrete, familiar things a child can
  // name from a picture (no symbols or abstract ideas).
  var WORDS = {
    A:["APPLE","ANT","AIRPLANE","ALLIGATOR"],
    B:["BALL","BANANA","BEAR","BEE","BUS","BUTTERFLY"],
    C:["CAT","CAR","CAKE","COW","CARROT"],
    D:["DOG","DUCK","DINOSAUR","DONUT","DRUM"],
    E:["ELEPHANT","EGG","EAGLE","EXCAVATOR"],
    F:["FISH","FROG","FLOWER","FOX","FIRE TRUCK"],
    G:["GRAPES","GIFT","GIRAFFE","GUITAR"],
    H:["HAT","HOUSE","HEART","HORSE","HELICOPTER"],
    I:["ICE CREAM","IGLOO","ISLAND"],
    J:["JUICE","JELLYFISH","JACKET"],
    K:["KITE","KEY","KOALA","KANGAROO"],
    L:["LION","LEMON","LEAF","LADYBUG"],
    M:["MONKEY","MOON","MUSHROOM","MOUSE","MILK"],
    N:["NEST","NOODLES","NUT"],
    O:["OCTOPUS","ORANGE","OWL"],
    P:["PIG","PIZZA","PENGUIN","PINEAPPLE","PANDA"],
    Q:["QUEEN","QUILT"],
    R:["RAINBOW","ROCKET","RABBIT","ROBOT"],
    S:["SUN","STAR","SNAKE","STRAWBERRY","SHEEP"],
    T:["TREE","TRAIN","TURTLE","TIGER"],
    U:["UMBRELLA","UNICORN"],
    V:["VAN","VIOLIN","VOLCANO"],
    W:["WHALE","WATERMELON","WORM","WAGON"],
    X:["X-RAY","XYLOPHONE"],
    Y:["YO-YO","YARN","YOGURT"],
    Z:["ZEBRA","ZIPPER"]
  };
  var LETTERS = Object.keys(WORDS);
  // letters whose names/sounds collide with another letter's words when
  // heard aloud (Cat/Kite, Giraffe/Juice, X/Excavator, Zebra/Xylophone,
  // Unicorn/Yo-yo...) — never pair them as target and distractor, or a
  // child matching by sound gets told they're wrong
  var CONFUSABLE = {
    C:["K","S"], K:["C","Q"], Q:["K"], S:["C"],
    G:["J"], J:["G"],
    E:["X"], X:["E"], Z:["X"],
    U:["Y"], Y:["U"]
  };

  /* ---------------- hand-drawn art ---------------- */
  // Every picture is a hand-crafted SVG on a 100x100 canvas, sharing one
  // ink outline and the game's palette so the cards match the painted sky.
  function I(body){
    return '<svg viewBox="0 0 100 100" aria-hidden="true" focusable="false">' +
      '<g stroke="#2e2d55" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">' +
      body + '</g></svg>';
  }
  var ART = {
    "APPLE": I('<path d="M50 35 Q49 22 40 16" fill="none"/><path d="M52 30 Q58 14 74 18 Q70 34 52 30 Z" fill="#8ad8a5"/><path d="M50 38 C34 26 18 38 20 58 C22 76 36 86 50 84 C64 86 78 76 80 58 C82 38 66 26 50 38 Z" fill="#ff6b6b"/><circle cx="36" cy="54" r="5" fill="#ffffff" opacity=".55" stroke="none"/>'),
    "ANT": I('<path d="M24 44 Q18 34 10 32 M34 42 Q36 32 44 28" fill="none"/><path d="M30 64 L24 82 M46 66 L44 84 M62 66 L70 82" fill="none"/><ellipse cx="71" cy="58" rx="15" ry="12" fill="#8b5e3c"/><circle cx="48" cy="58" r="10" fill="#8b5e3c"/><circle cx="28" cy="54" r="12" fill="#8b5e3c"/><circle cx="25" cy="52" r="2.4" fill="#2e2d55" stroke="none"/><path d="M22 59 Q25 62 28 60" fill="none" stroke-width="2.4"/>'),
    "AIRPLANE": I('<path d="M26 46 L12 26 L36 40 Z" fill="#ff6b6b"/><path d="M46 60 L30 82 L62 68 Z" fill="#ff6b6b"/><ellipse cx="52" cy="52" rx="36" ry="13" fill="#ffffff"/><circle cx="36" cy="50" r="3.4" fill="#4fb6ff" stroke="none"/><circle cx="48" cy="50" r="3.4" fill="#4fb6ff" stroke="none"/><circle cx="60" cy="50" r="3.4" fill="#4fb6ff" stroke="none"/><circle cx="72" cy="50" r="3.4" fill="#4fb6ff" stroke="none"/>'),
    "ALLIGATOR": I('<path d="M14 60 Q4 54 6 44 Q14 50 22 54 Z" fill="#6fc98f"/><ellipse cx="42" cy="60" rx="26" ry="13" fill="#6fc98f"/><path d="M28 49 L32 42 L37 48 M40 47 L44 40 L49 46" fill="none" stroke-width="2.5"/><path d="M58 50 Q84 48 90 56 Q90 62 82 62 L58 64 Z" fill="#6fc98f"/><path d="M64 62 L67 67 L70 62 L73 67 L76 62 L79 67 L82 62" stroke="#fff" stroke-width="2.5" fill="none"/><circle cx="58" cy="44" r="7" fill="#6fc98f"/><circle cx="59" cy="43" r="2.2" fill="#2e2d55" stroke="none"/><ellipse cx="34" cy="74" rx="6" ry="4" fill="#6fc98f"/><ellipse cx="52" cy="74" rx="6" ry="4" fill="#6fc98f"/>'),
    "BALL": I('<circle cx="50" cy="54" r="31" fill="#ffffff"/><path d="M50 42 L61 50 L57 63 L43 63 L39 50 Z" fill="#2e2d55"/><path d="M50 42 L50 24 M61 50 L78 45 M57 63 L66 79 M43 63 L34 79 M39 50 L22 45" fill="none"/>'),
    "BANANA": I('<path d="M25 31 L31 31 L32 21 Q28 18 25 20 Z" fill="#a97455"/><path d="M26 30 C22 64 44 80 82 52 C60 56 40 48 30 30 Z" fill="#ffd23f"/><path d="M33 36 Q41 57 64 63" stroke-width="2" opacity=".35" fill="none"/><circle cx="81" cy="53" r="2.4" fill="#a97455" stroke="none"/>'),
    "BEAR": I('<circle cx="29" cy="33" r="11" fill="#a97455"/><circle cx="71" cy="33" r="11" fill="#a97455"/><circle cx="29" cy="33" r="5" fill="#e6b98a" stroke="none"/><circle cx="71" cy="33" r="5" fill="#e6b98a" stroke="none"/><circle cx="50" cy="57" r="28" fill="#a97455"/><ellipse cx="50" cy="67" rx="13" ry="10" fill="#e6b98a" stroke="none"/><ellipse cx="50" cy="63" rx="4.5" ry="3.5" fill="#2e2d55" stroke="none"/><path d="M50 67 Q50 73 45 73 M50 67 Q50 73 55 73" fill="none" stroke-width="2.4"/><circle cx="39" cy="52" r="2.8" fill="#2e2d55" stroke="none"/><circle cx="61" cy="52" r="2.8" fill="#2e2d55" stroke="none"/>'),
    "BEE": I('<ellipse cx="42" cy="26" rx="10" ry="14" fill="#cfe8ff" opacity=".92" transform="rotate(-18 42 26)"/><ellipse cx="64" cy="28" rx="10" ry="14" fill="#cfe8ff" opacity=".92" transform="rotate(18 64 28)"/><path d="M38 44 Q34 34 26 32 M48 42 Q46 32 40 27" fill="none"/><ellipse cx="52" cy="58" rx="24" ry="18" fill="#ffd23f"/><path d="M50 41 Q46 58 50 76 M62 43 Q59 58 62 74" fill="none" stroke-width="6"/><path d="M75 53 L88 58 L75 63 Z" fill="#2e2d55"/><circle cx="36" cy="54" r="2.6" fill="#2e2d55" stroke="none"/><circle cx="44" cy="53" r="2.6" fill="#2e2d55" stroke="none"/><path d="M36 61 Q40 65 44 61" fill="none" stroke-width="2.4"/>'),
    "BUS": I('<rect x="12" y="34" width="76" height="34" rx="8" fill="#ffd23f"/><rect x="20" y="41" width="14" height="11" rx="2" fill="#bfe4ff"/><rect x="43" y="41" width="14" height="11" rx="2" fill="#bfe4ff"/><rect x="66" y="41" width="14" height="11" rx="2" fill="#bfe4ff"/><line x1="12" y1="58" x2="88" y2="58" stroke-width="2" opacity=".3"/><circle cx="30" cy="68" r="8" fill="#2e2d55"/><circle cx="70" cy="68" r="8" fill="#2e2d55"/><circle cx="30" cy="68" r="3" fill="#dfe6f5" stroke="none"/><circle cx="70" cy="68" r="3" fill="#dfe6f5" stroke="none"/><circle cx="85" cy="62" r="2.2" fill="#ff6b6b" stroke="none"/>'),

  /* ---------------- state ---------------- */
  var deck = [];          // shuffled letters, so every letter shows up before repeats
  var current = null;     // {letter, word}
  var stars = 0;
  var muted = false;
  var solvedThisRound = false;
  var wrongTaps = 0;
  var earnedThisRound = 0;
  var autoAdvanceTimer = null;
  var victoryDelayTimer = null;
  var victorySpeechTimer = null;
  var victorySoundTimers = [];  // scheduled tile chimes and star tones

  var $ = function(id){ return document.getElementById(id); };
  var reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  function shuffle(a){
    for(var i=a.length-1;i>0;i--){
      var j = Math.floor(Math.random()*(i+1));
      var t=a[i]; a[i]=a[j]; a[j]=t;
    }
    return a;
  }
  function pick(a){ return a[Math.floor(Math.random()*a.length)]; }

  /* ---------------- audio: chimes ---------------- */
  var actx = null;
  function audio(){
    if(!actx){
      var AC = window.AudioContext || window.webkitAudioContext;
      if(AC) actx = new AC();
    }
    if(actx && actx.state === "suspended") actx.resume();
    return actx;
  }
  function tone(freq, start, dur, type, vol){
    var ctx = audio(); if(!ctx || muted) return;
    var o = ctx.createOscillator(), g = ctx.createGain();
    o.type = type || "triangle";
    o.frequency.value = freq;
    var t = ctx.currentTime + start;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol || 0.25, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g).connect(ctx.destination);
    o.start(t); o.stop(t + dur + 0.05);
  }
  function chimeWrong(){
    tone(220, 0, 0.25, "sine", 0.18);
    tone(185, 0.12, 0.3, "sine", 0.15);
  }
  function chimeTile(i){
    tone(440 * Math.pow(1.06, i), 0, 0.18, "triangle", 0.12);
  }
  // party horn: quick slide-whistle up + ta-da chord
  function fanfare(){
    var ctx = audio(); if(!ctx || muted) return;
    var o = ctx.createOscillator(), g = ctx.createGain();
    o.type = "sawtooth";
    var t = ctx.currentTime;
    o.frequency.setValueAtTime(300, t);
    o.frequency.exponentialRampToValueAtTime(900, t + 0.35);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.12, t + 0.03);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.4);
    o.connect(g).connect(ctx.destination);
    o.start(t); o.stop(t + 0.45);
    [523.25, 659.25, 783.99].forEach(function(f){ tone(f, 0.4, 0.7, "triangle", 0.16); });
    [1046.5, 1318.5].forEach(function(f){ tone(f, 0.55, 0.8, "triangle", 0.1); });
  }

  /* ---------------- ambient music ---------------- */
  // Generative loop on a beat grid: a C-Am-F-G pad with music-box
  // sparkles, mixed well below the voice and effects. The tempo rises

        var a = i/6*TAU;
        s2.beginPath(); s2.arc(Math.cos(a)*8*s, -26*s + Math.sin(a)*8*s, 5.2*s, 0, TAU); s2.fill();
      }
      s2.fillStyle = "#a9744f";
      s2.beginPath(); s2.arc(0,-26*s,5*s,0,TAU); s2.fill();
      s2.restore();
    }

    function draw(t){
      s2.clearRect(0,0,W,H);
      sun(t);
      CLOUDS.forEach(function(c){
        var x = ((c.o + t*c.v) % (W+260)) - 130;
        cloud(x, H*c.y, c.s);
      });
      plane(t);
      bird(t, 0,   .30, 26, U);
      bird(t, 300, .25, 22, U*0.8);
      balloon(t);
      kite(t);
      hills();
      tree(W*0.07, H*0.99);
      flower(W*0.94, H*0.995, t);
    }

    resize();
    draw(20); // first frame right away, even in a background tab
    if(!reducedMotion){
      (function frame(now){
        if(!document.hidden) draw(20 + now/1000);
        requestAnimationFrame(frame);
      })(0);
    }
  })();

  /* ---------------- screens ---------------- */
  function show(id){
    ["screen-start","screen-play","screen-victory"].forEach(function(s){
      $(s).classList.toggle("hidden", s !== id);
    });
  }

  /* ---------------- rounds ---------------- */
  function nextLetter(){
    if(deck.length === 0){
      deck = shuffle(LETTERS.slice());
      // a fresh deck could deal the letter just played — move it to the bottom
      if(current && deck[deck.length-1] === current.letter) deck.unshift(deck.pop());
    }
    return deck.pop();
  }

  function newRound(){
    clearTimeout(autoAdvanceTimer);
    clearTimeout(victoryDelayTimer);
    clearTimeout(victorySpeechTimer);
    victorySoundTimers.forEach(function(t){ clearTimeout(t); });
    victorySoundTimers.length = 0;
    solvedThisRound = false;
    wrongTaps = 0;
    var letter = nextLetter();
    current = { letter: letter, word: pick(WORDS[letter]) };

    // two distractors from other letters, skipping sound-alike letters
    var avoid = CONFUSABLE[letter] || [];
    var others = shuffle(LETTERS.filter(function(l){ return l !== letter && avoid.indexOf(l) === -1; }));
    var options = [current];
    for(var i=0; options.length < 3 && i < others.length; i++){
      options.push({ letter: others[i], word: pick(WORDS[others[i]]) });
    }
    shuffle(options);

    // show the uppercase/lowercase pair, e.g. "B b"
    var block = $("letter-block");
    block.textContent = letter;
    var lower = document.createElement("span");
    lower.className = "lower";
    lower.textContent = letter.toLowerCase();
    block.appendChild(lower);
    block.style.animation = "none";
    void block.offsetWidth;
    block.style.animation = "";

    var holder = $("cards");
    holder.innerHTML = "";
    options.forEach(function(opt){
      var b = document.createElement("button");
      b.className = "card";
      b.innerHTML = ART[opt.word];
      b.setAttribute("aria-label", opt.word.toLowerCase());
      b.addEventListener("click", function(){ onCard(b, opt); });
      holder.appendChild(b);
    });

    show("screen-play");
    speakPrompt();
  }

  function onCard(btn, opt){
    if(solvedThisRound) return;
    if(opt.letter === current.letter){
      solvedThisRound = true;
      btn.classList.add("right");
      fanfare();
      burstConfetti();
      earnedThisRound = wrongTaps === 0 ? 3 : wrongTaps === 1 ? 2 : 1;
      stars += earnedThisRound;
      $("star-count").textContent = stars;
      victoryDelayTimer = setTimeout(showVictory, reducedMotion ? 150 : 750);
    }else{
      wrongTaps++;
      btn.classList.add("wrong");
      chimeWrong();
      // teach instead of just rejecting: name what they tapped and its letter
      var w = opt.word.toLowerCase().replace("-", " ");
      speakParts([
        { t: w + "!", pitch: 1.1, rate: 0.95 },
        { t: w + " starts with " + opt.letter + ". Try again!", pitch: 1.05, rate: 0.9 }
      ]);
    }
  }

  function showVictory(){
    $("victory-art").innerHTML = ART[current.word];
    $("is-for").textContent = current.letter + " is for…";

    var tiles = $("word-tiles");
    tiles.innerHTML = "";
    var chars = current.word.split("");
    var shown = 0;
    chars.forEach(function(ch, i){
      var t = document.createElement("div");
      t.className = "tile";
      if(ch === " " || ch === "-"){
        t.style.visibility = "hidden";
        t.style.borderWidth = "0";
        t.style.boxShadow = "none";
        t.style.padding = "0 6px";
      } else if(shown === 0){
        t.className += " first";
      }
      if(ch !== " " && ch !== "-") shown++;
      t.textContent = ch === " " ? " " : ch;
      var delay = reducedMotion ? 0 : 0.35 + i*0.22;
      t.style.animationDelay = delay + "s";
      if(!reducedMotion && ch !== " " && ch !== "-"){
        victorySoundTimers.push(setTimeout(function(){ chimeTile(i); }, delay*1000));
      }
      tiles.appendChild(t);
    });

    // round rating: 3 stars for a one-shot, 2 for one miss, 1 otherwise
    var slots = $("victory-stars");
    slots.innerHTML = "";
    var starBase = reducedMotion ? 0 : 0.5 + chars.length*0.22;
    for(var s=0; s<3; s++){
      var sp = document.createElement("span");
      sp.textContent = "⭐";
      if(s < earnedThisRound){
        sp.className = "won";
        var sDelay = starBase + s*0.3;
        sp.style.animationDelay = sDelay + "s";
        if(!reducedMotion){
          (function(n, when){
            victorySoundTimers.push(setTimeout(function(){ tone(660*Math.pow(1.26, n), 0, 0.25, "triangle", 0.15); }, when*1000));
          })(s, sDelay);
        }
      }else{
        sp.className = "lost";
      }
      slots.appendChild(sp);
    }

    show("screen-victory");
    var sayWord = current.word.toLowerCase().replace("-", " ");

    clearTimeout(autoAdvanceTimer);
    clearTimeout(victorySpeechTimer);
    if(muted || !("speechSynthesis" in window)){
      // no narration to wait for — just give a bit longer to look at the word
      autoAdvanceTimer = setTimeout(newRound, 5000);
    }else{
      victorySpeechTimer = setTimeout(function(){
        speakParts([
          { t: pick(PRAISE), pitch: 1.3, rate: 1.05 },
          { t: current.letter + " is for " + sayWord + "!", pitch: 1.1, rate: 0.85 }
        ], function(){
          autoAdvanceTimer = setTimeout(newRound, 3000);
        });
      }, reducedMotion ? 100 : 900);
    }
  }

  /* ---------------- wiring ---------------- */
  $("start-art-1").innerHTML = ART.BEE;
  $("start-art-2").innerHTML = ART.APPLE;
  window.ALPHABET_ART = ART; // handy for eyeballing every drawing in devtools
  $("play-btn").addEventListener("click", function(){
    audio();               // unlock audio on user gesture (iOS)
    unlockSpeech();        // unlock speech on user gesture (iOS)
    startMusic();
    newRound();
  });
  $("next-btn").addEventListener("click", newRound);
  $("repeat-btn").addEventListener("click", speakPrompt);
  $("mute-btn").addEventListener("click", function(){
    muted = !muted;
    $("mute-btn").textContent = muted ? "🔇" : "🔊";
    if(muted){
      if("speechSynthesis" in window) window.speechSynthesis.cancel();
      stopMusic();
    }else if(actx){
      startMusic();
    }
  });
  document.addEventListener("visibilitychange", function(){
    if(!actx) return;
    if(document.hidden){ actx.suspend(); }
    else if(actx.state === "suspended"){ actx.resume(); }
  });
})();
</script>
</body>
</html>
