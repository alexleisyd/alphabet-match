<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Alphabet Match</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔤</text></svg>">
</head>
<body>
<style>
  :root{
    --sky-top:#c9ecff;
    --sky-bottom:#e9fbf0;
    --card:#ffffff;
    --card-edge:#2e2d55;
    --sunshine:#ffd23f;
    --sunshine-edge:#e8a800;
    --coral:#ff6b6b;
    --grape:#6c4fd8;
    --leaf:#26b789;
    --ink:#2e2d55;
    --ink-soft:#6a6899;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    margin:0;
    font-family:ui-rounded,"SF Pro Rounded","Arial Rounded MT Bold","Hiragino Maru Gothic ProN","Comic Sans MS",system-ui,sans-serif;
    background:linear-gradient(180deg,var(--sky-top) 0%,var(--sky-bottom) 100%);
    color:var(--ink);
    touch-action:manipulation;
    user-select:none;
    -webkit-user-select:none;
    overflow:hidden;
  }
  button{
    font-family:inherit;
    color:inherit;
    cursor:pointer;
    border:none;
    background:none;
    touch-action:manipulation;
  }
  button:focus-visible{outline:4px solid var(--grape);outline-offset:3px}

  /* ---------- stage ---------- */
  .stage{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:clamp(12px,2.5vh,28px);
    padding:clamp(12px,3vw,32px);
    text-align:center;
  }
  .hidden{display:none !important}

  /* ---------- painted sky ---------- */
  #sky{position:fixed;inset:0;pointer-events:none;z-index:0}

  /* ---------- top bar ---------- */
  .topbar{
    position:fixed;
    top:0;left:0;right:0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:clamp(10px,2vw,18px) clamp(14px,3vw,24px);
    z-index:5;
    pointer-events:none;
  }
  .topbar>*{pointer-events:auto}
  .stars{
    display:flex;
    align-items:center;
    gap:8px;
    background:rgba(255,255,255,.85);
    border:3px solid var(--card-edge);
    border-radius:999px;
    padding:6px 16px;
    font-size:clamp(18px,3vw,24px);
    font-weight:800;
    box-shadow:0 4px 0 rgba(46,45,85,.18);
  }
  .round-btn{
    width:clamp(48px,7vw,58px);
    height:clamp(48px,7vw,58px);
    border-radius:50%;
    background:rgba(255,255,255,.85);
    border:3px solid var(--card-edge);
    font-size:clamp(20px,3vw,26px);
    box-shadow:0 4px 0 rgba(46,45,85,.18);
    display:flex;align-items:center;justify-content:center;
    transition:transform .1s;
  }
  .round-btn:active{transform:scale(.9)}

  /* ---------- start screen ---------- */
  .start-title{
    font-size:clamp(34px,7vw,60px);
    font-weight:900;
    margin:0;
    letter-spacing:.02em;
    text-wrap:balance;
  }
  .start-blocks{
    display:flex;
    gap:clamp(8px,2vw,16px);
    font-size:clamp(44px,10vw,84px);
  }
  .start-blocks span{
    display:inline-block;
    animation:bob 2.2s ease-in-out infinite;
  }
  .start-blocks span:nth-child(2){animation-delay:.25s}
  .start-blocks span:nth-child(3){animation-delay:.5s}
  .start-blocks span:nth-child(4){animation-delay:.75s}
  @keyframes bob{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-14px)}
  }
  .big-btn{
    font-size:clamp(24px,5vw,34px);
    font-weight:900;
    letter-spacing:.03em;
    background:var(--leaf);
    color:#fff;
    border:4px solid var(--card-edge);
    border-radius:999px;
    padding:clamp(16px,3vh,22px) clamp(40px,8vw,64px);
    box-shadow:0 7px 0 rgba(46,45,85,.35);
    transition:transform .1s, box-shadow .1s;
  }
  .big-btn:active{transform:translateY(5px);box-shadow:0 2px 0 rgba(46,45,85,.35)}
  .big-btn.next{background:var(--coral)}

  /* ---------- play screen ---------- */
  .prompt-row{
    display:flex;
    align-items:center;
    gap:clamp(12px,3vw,24px);
  }
  .letter-block{
    font-size:clamp(72px,16vh,150px);
    font-weight:900;
    line-height:1;
    background:linear-gradient(180deg,#ffe07a 0%,var(--sunshine) 100%);
    border:5px solid var(--sunshine-edge);
    border-radius:clamp(18px,3vw,28px);
    padding:clamp(14px,2.5vh,26px) clamp(24px,4.5vh,44px);
    box-shadow:0 8px 0 var(--sunshine-edge), 0 14px 22px rgba(46,45,85,.18);
    color:var(--ink);
    animation:pop-in .45s cubic-bezier(.2,1.6,.4,1) both;
  }
  .speak-btn{
    width:clamp(58px,9vw,72px);
    height:clamp(58px,9vw,72px);
    border-radius:50%;
    background:var(--grape);
    border:4px solid var(--card-edge);
    font-size:clamp(24px,4vw,32px);
    box-shadow:0 5px 0 rgba(46,45,85,.35);
    display:flex;align-items:center;justify-content:center;
    transition:transform .1s;
  }
  .speak-btn:active{transform:scale(.9)}
  .prompt-text{
    font-size:clamp(18px,3.2vw,26px);
    font-weight:800;
    color:var(--ink-soft);
    margin:0;
  }
  .cards{
    display:flex;
    justify-content:center;
    gap:clamp(10px,2.5vw,28px);
    width:100%;
    max-width:920px;
  }
  .card{
    flex:1 1 0;
    max-width:270px;
    aspect-ratio:1/1.06;
    background:var(--card);
    border:5px solid var(--card-edge);
    border-radius:clamp(20px,3.5vw,32px);
    box-shadow:0 8px 0 rgba(46,45,85,.22);
    font-size:clamp(56px,13vw,120px);
    line-height:1;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:transform .12s, box-shadow .12s, opacity .3s;
    animation:pop-in .45s cubic-bezier(.2,1.6,.4,1) both;
  }
  .card:nth-child(2){animation-delay:.08s}
  .card:nth-child(3){animation-delay:.16s}
  .card:active{transform:scale(.94) translateY(4px);box-shadow:0 3px 0 rgba(46,45,85,.22)}
  .card.wrong{
    animation:wiggle .5s ease;
    opacity:.35;
    pointer-events:none;
  }
  .card.right{
    animation:cheer .6s cubic-bezier(.2,1.6,.4,1);
    background:#eafff4;
    border-color:var(--leaf);
    box-shadow:0 8px 0 rgba(38,183,137,.5);
  }
  @keyframes pop-in{
    from{transform:scale(.3);opacity:0}
    to{transform:scale(1);opacity:1}
  }
  @keyframes wiggle{
    0%,100%{transform:translateX(0) rotate(0)}
    20%{transform:translateX(-12px) rotate(-4deg)}
    40%{transform:translateX(12px) rotate(4deg)}
    60%{transform:translateX(-9px) rotate(-3deg)}
    80%{transform:translateX(9px) rotate(3deg)}
  }
  @keyframes cheer{
    0%{transform:scale(1)}
    40%{transform:scale(1.18) rotate(-3deg)}
    70%{transform:scale(1.08) rotate(2deg)}
    100%{transform:scale(1.12)}
  }

  /* ---------- victory screen ---------- */
  .victory-emoji{
    font-size:clamp(96px,22vh,190px);
    line-height:1;
    animation:bounce-big .9s cubic-bezier(.3,1.6,.4,1) both;
  }
  @keyframes bounce-big{
    0%{transform:scale(0) rotate(-15deg)}
    55%{transform:scale(1.2) rotate(6deg)}
    100%{transform:scale(1) rotate(0)}
  }
  .word-tiles{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:clamp(6px,1.5vw,12px);
  }
  .tile{
    font-size:clamp(30px,7vw,60px);
    font-weight:900;
    line-height:1;
    background:var(--card);
    border:4px solid var(--card-edge);
    border-radius:clamp(10px,2vw,16px);
    padding:clamp(10px,2vh,18px) clamp(12px,2.4vh,22px);
    box-shadow:0 5px 0 rgba(46,45,85,.22);
    animation:tile-pop .4s cubic-bezier(.2,1.6,.4,1) both;
  }
  .tile.first{
    background:linear-gradient(180deg,#ffe07a 0%,var(--sunshine) 100%);
    border-color:var(--sunshine-edge);
    box-shadow:0 5px 0 var(--sunshine-edge);
  }
  @keyframes tile-pop{
    from{transform:scale(0) translateY(20px);opacity:0}
    to{transform:scale(1) translateY(0);opacity:1}
  }
  .is-for{
    font-size:clamp(22px,4.5vw,36px);
    font-weight:900;
    margin:0;
    color:var(--grape);
  }
  .victory-stars{
    display:flex;
    justify-content:center;
    gap:clamp(8px,2vw,16px);
    font-size:clamp(32px,6.5vw,52px);
    line-height:1;
    min-height:1.2em;
  }
  .victory-stars .won{
    display:inline-block;
    animation:tile-pop .45s cubic-bezier(.2,1.6,.4,1) both;
  }
  .victory-stars .lost{opacity:.22;filter:grayscale(1)}

  /* confetti canvas */
  #confetti{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:20;
  }

  /* short screens (phone landscape): tighten play screen */
  @media (max-height:520px){
    .letter-block{font-size:clamp(56px,18vh,90px);padding:10px 26px}
    .prompt-text{display:none}
    .stage{gap:10px}
    .victory-emoji{font-size:clamp(70px,26vh,110px)}
  }

  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{animation-duration:.01s !important;animation-delay:0s !important;transition-duration:.01s !important}
  }
</style>

<canvas id="sky"></canvas>
<canvas id="confetti"></canvas>

<div class="topbar">
  <div class="stars">⭐ <span id="star-count">0</span></div>
  <button class="round-btn" id="mute-btn" aria-label="Turn sound on or off">🔊</button>
</div>

<!-- START -->
<div class="stage" id="screen-start">
  <div class="start-blocks" aria-hidden="true"><span>🅰️</span><span>🐝</span><span>🅱️</span><span>🍎</span></div>
  <h1 class="start-title">Alphabet Match!</h1>
  <button class="big-btn" id="play-btn">▶&nbsp; PLAY</button>
</div>

<!-- PLAY -->
<div class="stage hidden" id="screen-play">
  <div class="prompt-row">
    <div class="letter-block" id="letter-block">B</div>
    <button class="speak-btn" id="repeat-btn" aria-label="Hear it again">🔊</button>
  </div>
  <p class="prompt-text">Which picture starts with this letter?</p>
  <div class="cards" id="cards"></div>
</div>

<!-- VICTORY -->
<div class="stage hidden" id="screen-victory">
  <div class="victory-emoji" id="victory-emoji">⚽</div>
  <p class="is-for" id="is-for">B is for…</p>
  <div class="word-tiles" id="word-tiles"></div>
  <div class="victory-stars" id="victory-stars"></div>
  <button class="big-btn next" id="next-btn">NEXT &nbsp;▶</button>
</div>

<script>
(function(){
  "use strict";

  /* ---------------- word bank ---------------- */
  var WORDS = {
    A:[["APPLE","🍎"],["AIRPLANE","✈️"],["ANT","🐜"],["ALLIGATOR","🐊"]],
    B:[["BALL","⚽"],["BANANA","🍌"],["BEAR","🐻"],["BEE","🐝"],["BUS","🚌"],["BUTTERFLY","🦋"]],
    C:[["CAT","🐱"],["CAR","🚗"],["CAKE","🎂"],["COW","🐮"],["CARROT","🥕"]],
    D:[["DOG","🐶"],["DUCK","🦆"],["DINOSAUR","🦕"],["DONUT","🍩"],["DRUM","🥁"]],
    E:[["ELEPHANT","🐘"],["EGG","🥚"],["EAGLE","🦅"]],
    F:[["FISH","🐟"],["FROG","🐸"],["FOX","🦊"],["FLOWER","🌸"]],
    G:[["GIRAFFE","🦒"],["GRAPES","🍇"],["GIFT","🎁"],["GUITAR","🎸"]],
    H:[["HORSE","🐴"],["HAT","🎩"],["HOUSE","🏠"],["HEART","❤️"]],
    I:[["ICE CREAM","🍦"],["ICE","🧊"],["ISLAND","🏝️"]],
    J:[["JUICE","🧃"],["JELLYFISH","🪼"],["JACKET","🧥"]],
    K:[["KITE","🪁"],["KOALA","🐨"],["KEY","🔑"],["KANGAROO","🦘"]],
    L:[["LION","🦁"],["LEMON","🍋"],["LADYBUG","🐞"],["LEAF","🍃"]],
    M:[["MONKEY","🐵"],["MOON","🌙"],["MOUSE","🐭"],["MUSHROOM","🍄"]],
    N:[["NOSE","👃"],["NEST","🪺"],["NOODLES","🍜"]],
    O:[["OCTOPUS","🐙"],["ORANGE","🍊"],["OWL","🦉"]],
    P:[["PIG","🐷"],["PIZZA","🍕"],["PENGUIN","🐧"],["PINEAPPLE","🍍"]],
    Q:[["QUEEN","👸"],["QUESTION MARK","❓"],["QUIET","🤫"]],
    R:[["RABBIT","🐰"],["RAINBOW","🌈"],["ROBOT","🤖"],["ROCKET","🚀"]],
    S:[["SUN","☀️"],["SNAKE","🐍"],["STAR","⭐"],["STRAWBERRY","🍓"]],
    T:[["TIGER","🐯"],["TRAIN","🚂"],["TURTLE","🐢"],["TREE","🌳"]],
    U:[["UMBRELLA","☂️"],["UNICORN","🦄"],["UFO","🛸"]],
    V:[["VIOLIN","🎻"],["VOLCANO","🌋"],["VAN","🚐"]],
    W:[["WHALE","🐳"],["WATERMELON","🍉"],["WATCH","⌚"]],
    X:[["X-RAY","🩻"],["X MARK","❌"]],
    Y:[["YO-YO","🪀"],["YARN","🧶"],["YAWN","🥱"]],
    Z:[["ZEBRA","🦓"],["ZUCCHINI","🥒"]]
  };
  var LETTERS = Object.keys(WORDS);

  /* ---------------- state ---------------- */
  var deck = [];          // shuffled letters, so every letter shows up before repeats
  var current = null;     // {letter, word, emoji}
  var stars = 0;
  var muted = false;
  var solvedThisRound = false;
  var wrongTaps = 0;
  var earnedThisRound = 0;
  var autoAdvanceTimer = null;
  var victoryDelayTimer = null;
  var victorySpeechTimer = null;

  var $ = function(id){ return document.getElementById(id); };
  var reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  function shuffle(a){
    for(var i=a.length-1;i>0;i--){
      var j = Math.floor(Math.random()*(i+1));
      var t=a[i]; a[i]=a[j]; a[j]=t;
    }
    return a;
  }
  function pick(a){ return a[Math.floor(Math.random()*a.length)]; }

  /* ---------------- audio: chimes ---------------- */
  var actx = null;
  function audio(){
    if(!actx){
      var AC = window.AudioContext || window.webkitAudioContext;
      if(AC) actx = new AC();
    }
    if(actx && actx.state === "suspended") actx.resume();
    return actx;
  }
  function tone(freq, start, dur, type, vol){
    var ctx = audio(); if(!ctx || muted) return;
    var o = ctx.createOscillator(), g = ctx.createGain();
    o.type = type || "triangle";
    o.frequency.value = freq;
    var t = ctx.currentTime + start;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol || 0.25, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g).connect(ctx.destination);
    o.start(t); o.stop(t + dur + 0.05);
  }
  function chimeWrong(){
    tone(220, 0, 0.25, "sine", 0.18);
    tone(185, 0.12, 0.3, "sine", 0.15);
  }
  function chimeTile(i){
    tone(440 * Math.pow(1.06, i), 0, 0.18, "triangle", 0.12);
  }
  // party horn: quick slide-whistle up + ta-da chord
  function fanfare(){
    var ctx = audio(); if(!ctx || muted) return;
    var o = ctx.createOscillator(), g = ctx.createGain();
    o.type = "sawtooth";
    var t = ctx.currentTime;
    o.frequency.setValueAtTime(300, t);
    o.frequency.exponentialRampToValueAtTime(900, t + 0.35);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.12, t + 0.03);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.4);
    o.connect(g).connect(ctx.destination);
    o.start(t); o.stop(t + 0.45);
    [523.25, 659.25, 783.99].forEach(function(f){ tone(f, 0.4, 0.7, "triangle", 0.16); });
    [1046.5, 1318.5].forEach(function(f){ tone(f, 0.55, 0.8, "triangle", 0.1); });
  }

  /* ---------------- ambient music ---------------- */
  // Generative loop on a beat grid: a C-Am-F-G pad with music-box
  // sparkles, mixed well below the voice and effects. The tempo rises
  // with the star count and percussion layers join as stars build up:
  //   5+ stars: soft shaker ticks    10+: kick drum + bass plucks
  //  20+ stars: snare backbeat, so success literally picks up the beat.
  var music = { on:false, gain:null, beatTimer:null, sparkTimer:null, beat:0, chordIdx:0, root:0, noise:null };
  var CHORDS = [
    [130.81, 261.63, 329.63, 392.00],   // C
    [110.00, 220.00, 261.63, 329.63],   // Am
    [174.61, 261.63, 349.23, 440.00],   // F
    [196.00, 246.94, 293.66, 392.00]    // G
  ];
  var SPARKLES = [523.25, 587.33, 659.25, 783.99, 880.00, 1046.50];
  function energy(){ return Math.min(stars, 36); }
  function beatSeconds(){ return 60 / (76 + energy()*1.5); }  // 76 -> 130 bpm
  function playPadOsc(freq, dur, vol, type){
    var o = actx.createOscillator(), g = actx.createGain();
    o.type = type;
    o.frequency.value = freq;
    o.detune.value = (Math.random()-0.5)*8;
    var t = actx.currentTime;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(vol, t + dur*0.35);
    g.gain.linearRampToValueAtTime(0.0001, t + dur);
    o.connect(g).connect(music.gain);
    o.start(t); o.stop(t + dur + 0.1);
  }
  function padNote(freq, dur, vol){
    playPadOsc(freq, dur, vol, freq < 200 ? "sine" : "triangle");
    if(freq < 180){
      // small tablet speakers barely reproduce this low a fundamental —
      // add a quiet octave-up shadow so the note still reads as present
      playPadOsc(freq*2, dur, vol*0.4, "sine");
    }
  }
  function kick(){
    var o = actx.createOscillator(), g = actx.createGain();
    o.type = "sine";
    var t = actx.currentTime;
    o.frequency.setValueAtTime(150, t);
    o.frequency.exponentialRampToValueAtTime(45, t + 0.12);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(1.5, t + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.16);
    o.connect(g).connect(music.gain);
    o.start(t); o.stop(t + 0.2);
  }
  function noiseBurst(filterType, freq, vol, dur){
    if(!music.noise){
      music.noise = actx.createBuffer(1, actx.sampleRate*0.2, actx.sampleRate);
      var d = music.noise.getChannelData(0);
      for(var i=0;i<d.length;i++) d[i] = Math.random()*2 - 1;
    }
    var src = actx.createBufferSource(), g = actx.createGain(), f = actx.createBiquadFilter();
    src.buffer = music.noise;
    f.type = filterType; f.frequency.value = freq;
    var t = actx.currentTime;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(f).connect(g).connect(music.gain);
    src.start(t); src.stop(t + dur + 0.05);
  }
  function shaker(){ noiseBurst("highpass", 6500, 0.35, 0.05); }
  function snare(){ noiseBurst("bandpass", 1800, 0.9, 0.13); }
  function bassPluck(freq){
    var o = actx.createOscillator(), g = actx.createGain();
    o.type = "triangle";
    o.frequency.value = freq;
    var t = actx.currentTime;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.6, t + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.28);
    o.connect(g).connect(music.gain);
    o.start(t); o.stop(t + 0.35);
  }
  function nextBeat(){
    if(!music.on) return;
    var spb = beatSeconds();
    if(!document.hidden){
      var e = energy();
      var pos = music.beat % 4;
      if(music.beat % 8 === 0){
        var chord = CHORDS[music.chordIdx % CHORDS.length];
        music.chordIdx++;
        music.root = chord[0];
        var dur = spb*8 + 1;
        chord.forEach(function(f, i){ padNote(f, dur, i === 0 ? 0.5 : 0.28); });
      }
      if(e >= 5) shaker();
      if(e >= 10 && (pos === 0 || pos === 2)){
        kick();
        if(music.root) bassPluck(music.root*2);
      }
      if(e >= 20 && (pos === 1 || pos === 3)) snare();
      // a touch louder as it gets livelier
      music.gain.gain.setTargetAtTime(0.065 + (e/36)*0.035, actx.currentTime, 0.8);
    }
    music.beat++;
    music.beatTimer = setTimeout(nextBeat, spb*1000);
  }
  function sparkle(){
    if(!music.on) return;
    if(!document.hidden){
      var o = actx.createOscillator(), g = actx.createGain();
      o.type = "sine";
      o.frequency.value = pick(SPARKLES);

        speakParts([
          { t: pick(PRAISE), pitch: 1.3, rate: 1.05 },
          { t: current.letter + " is for " + sayWord + "!", pitch: 1.1, rate: 0.85 }
        ], function(){
          autoAdvanceTimer = setTimeout(newRound, 3000);
        });
      }, reducedMotion ? 100 : 900);
    }
  }

  /* ---------------- wiring ---------------- */
  $("play-btn").addEventListener("click", function(){
    audio();               // unlock audio on user gesture (iOS)
    speak(" ");            // unlock speech on user gesture (iOS)
    startMusic();
    newRound();
  });
  $("next-btn").addEventListener("click", newRound);
  $("repeat-btn").addEventListener("click", speakPrompt);
  $("mute-btn").addEventListener("click", function(){
    muted = !muted;
    $("mute-btn").textContent = muted ? "🔇" : "🔊";
    if(muted){
      if("speechSynthesis" in window) window.speechSynthesis.cancel();
      stopMusic();
    }else if(actx){
      startMusic();
    }
  });
  document.addEventListener("visibilitychange", function(){
    if(!actx) return;
    if(document.hidden){ actx.suspend(); }
    else if(actx.state === "suspended"){ actx.resume(); }
  });
})();
</script>
</body>
</html>
